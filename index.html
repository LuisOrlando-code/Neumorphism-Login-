<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Login & Register Page</title>
</head>
<body>

    <div class="main">
        <!-- Formulario de Registro -->
        <div class="container register-form" id="register-container">
            <form action="" class="form" id="reg-form">
                <h2 class="form-title title">Create Account</h2>
                <div class="form-icon"></div>
                <span class="form-span">or use email for registration</span>
                <input type="text" class="form-input" placeholder="Name">
                <input type="email" class="form-input" placeholder="Email">
                <input type="password" class="form-input" placeholder="Password">
                <button class="form-button button submit">SIGN UP</button>
            </form>
        </div>

        <!-- Formulario de Login -->
        <div class="container login-form" id="login-container">
            <form action="" class="form" id="log-form">
                <h2 class="form-title title">Sign in To Website</h2>
                <div class="form-icon"></div>
                <span class="form-span">or use your email account</span>
                <input type="email" class="form-input" placeholder="Email">
                <input type="password" class="form-input" placeholder="Password">
                <a href="#" class="form-link">Forgot Your Password?</a>
                <button class="form-button button submit">SIGN IN</button>
            </form>
        </div>

        <!-- Panel de Intercambio (Switch) -->
        <div class="switch" id="switch-frm">
            <div class="switch-circle"></div>
            <div class="switch-circle switch-circle-t"></div>
            
            <div class="switch-form" id="switch-f1">
                <h2 class="switch-title title">Welcome Back!</h2>
                <p class="switch-description description">
                    To keep connected with us please login with your personal information
                </p>
                <button class="switch-button button switch-btn">SIGN IN</button>
            </div>

            <div class="switch-form is-hidden" id="switch-f2">
                <h2 class="switch-title title">Hello Friend!</h2>
                <p class="switch-description description">
                    Enter your personal details and start journey with us
                </p>
                <button class="switch-button button switch-btn">SIGN UP</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
